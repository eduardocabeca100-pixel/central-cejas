<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema CEJAS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.25), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(0,0,0,.35), transparent 34%),
        linear-gradient(135deg, #7b7c80, #3f4044);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login {
      width: min(1080px, 100%);
      min-height: 640px;
      display: grid;
      grid-template-columns: 1fr 430px;
      overflow: hidden;
      border-radius: 36px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      box-shadow: 0 45px 140px rgba(0,0,0,.38);
    }

    .brand {
      position: relative;
      display: grid;
      place-items: center;
      padding: 48px;
      background: rgba(255,255,255,.10);
      overflow: hidden;
    }

    .brand::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      top: -180px;
      right: -180px;
      background: rgba(255,255,255,.13);
    }

    .brand-inner {
      position: relative;
      z-index: 2;
      display: grid;
      justify-items: center;
      gap: 38px;
      width: min(82%, 470px);
      text-align: center;
    }

    .brand-inner img {
      width: 100%;
      max-height: 390px;
      object-fit: contain;
      display: block;
    }

    .kicker {
      font-size: 13px;
      letter-spacing: .55em;
      font-weight: 900;
      color: rgba(255,255,255,.86);
    }

    .panel {
      background: rgba(18,18,22,.86);
      border-left: 1px solid rgba(255,255,255,.14);
      padding: 46px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      letter-spacing: -0.05em;
    }

    .sub {
      margin: 0 0 28px;
      color: rgba(255,255,255,.68);
      line-height: 1.45;
    }

    .msg {
      display: none;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
    }

    .msg.err {
      display: block;
      background: rgba(239,68,68,.18);
      border: 1px solid rgba(239,68,68,.38);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 900;
      color: rgba(255,255,255,.64);
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    .pass {
      position: relative;
    }

    .pass input {
      padding-right: 58px;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,.12);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 22px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 9px;
      text-transform: none;
      letter-spacing: 0;
      color: rgba(255,255,255,.74);
      font-size: 14px;
    }

    .remember input {
      width: 18px;
      height: 18px;
      accent-color: white;
    }

    a {
      color: white;
      font-weight: 900;
      text-decoration: none;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 17px;
      background: white;
      color: #292a2d;
      font-size: 16px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    .notice {
      margin-top: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 880px) {
      .login { grid-template-columns: 1fr; }
      .brand { min-height: 300px; }
      .panel { border-left: 0; border-top: 1px solid rgba(255,255,255,.14); }
      .brand-inner { width: min(78%, 320px); }
    }
  </style>
</head>
<body>
  <main class="login">
    <section class="brand">
      <div class="brand-inner">
        <img src="/assets/cejas-login-logo.png" alt="CEJAS" onerror="this.src='/assets/logo.svg'">
        <div class="kicker">SISTEMA INTERNO</div>
      </div>
    </section>

    <section class="panel">
      <h1>Entrar</h1>
      <p class="sub">Entre com seu e-mail institucional do CEJAS.</p>

      <div id="mensagem" class="msg"></div>

      <form action="/entrar-master-cejas" method="POST" autocomplete="on">
        <div class="field">
          <label>E-mail institucional</label>
          <input name="email" id="email" type="email" placeholder="nome@cejas.com.br" autocomplete="username" required>
        </div>

        <div class="field">
          <label>Senha</label>
          <div class="pass">
            <input name="senha" id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password" required>
            <button class="eye" type="button" id="toggleSenha">👁</button>
          </div>
        </div>

        <div class="row">
          <label class="remember">
            <input name="lembrar" type="checkbox">
            Manter-me conectado
          </label>

          <a href="#" onclick="alert('Redefinição será reativada depois.'); return false;">Esqueci minha senha</a>
        </div>

        <button class="btn" type="submit">Entrar no sistema</button>
      </form>

      <div class="notice">
        Acesso restrito ao login institucional do CEJAS.
      </div>
    </section>
  </main>

  <script>
    const senha = document.getElementById("senha");
    const toggle = document.getElementById("toggleSenha");
    const msg = document.getElementById("mensagem");

    toggle.addEventListener("click", () => {
      senha.type = senha.type === "password" ? "text" : "password";
    });

    const params = new URLSearchParams(window.location.search);
    const erro = params.get("erro");

    if (erro) {
      msg.textContent = erro;
      msg.className = "msg err";
    }
  </script>
</body>
</html>
