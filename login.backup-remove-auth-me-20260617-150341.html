<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema CEJAS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 25% 15%, rgba(255,255,255,.22), transparent 28%),
        radial-gradient(circle at 75% 85%, rgba(0,0,0,.38), transparent 35%),
        linear-gradient(135deg, #77787b, #424348);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login {
      width: min(1080px, 100%);
      min-height: 640px;
      display: grid;
      grid-template-columns: 1fr 430px;
      border-radius: 36px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 45px 130px rgba(0,0,0,.38);
    }

    .brand {
      position: relative;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.09);
      padding: 48px;
      overflow: hidden;
    }

    .brand::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      top: -180px;
      right: -180px;
      background: rgba(255,255,255,.12);
    }

    .logo-area {
      position: relative;
      z-index: 2;
      width: min(82%, 460px);
      display: grid;
      gap: 36px;
      text-align: center;
      justify-items: center;
    }

    .logo-area img {
      width: 100%;
      max-height: 380px;
      object-fit: contain;
      display: block;
    }

    .kicker {
      letter-spacing: .55em;
      font-size: 13px;
      font-weight: 900;
      color: rgba(255,255,255,.84);
    }

    .panel {
      background: rgba(19,19,23,.82);
      border-left: 1px solid rgba(255,255,255,.14);
      padding: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 38px;
      letter-spacing: -0.05em;
    }

    .sub {
      margin: 0 0 28px;
      color: rgba(255,255,255,.68);
      line-height: 1.45;
    }

    .msg {
      display: none;
      margin-bottom: 16px;
      padding: 13px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
    }

    .msg.err {
      display: block;
      background: rgba(239,68,68,.18);
      border: 1px solid rgba(239,68,68,.34);
    }

    .msg.ok {
      display: block;
      background: rgba(34,197,94,.18);
      border: 1px solid rgba(34,197,94,.34);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 900;
      color: rgba(255,255,255,.62);
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(255,255,255,.65);
      box-shadow: 0 0 0 4px rgba(255,255,255,.10);
    }

    .pass {
      position: relative;
    }

    .pass input {
      padding-right: 58px;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,.10);
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 8px 0 22px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 9px;
      text-transform: none;
      letter-spacing: 0;
      color: rgba(255,255,255,.72);
      font-size: 14px;
    }

    .remember input {
      width: 18px;
      height: 18px;
      accent-color: white;
    }

    a {
      color: white;
      text-decoration: none;
      font-weight: 900;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      background: white;
      color: #292a2d;
      font-weight: 1000;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .notice {
      margin-top: 18px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 880px) {
      .login { grid-template-columns: 1fr; }
      .brand { min-height: 300px; }
      .panel { border-left: 0; border-top: 1px solid rgba(255,255,255,.14); }
      .logo-area { width: min(78%, 310px); }
    }
  </style>
</head>
<body>
  <main class="login">
    <section class="brand">
      <div class="logo-area">
        <img src="/assets/cejas-login-logo.png" alt="CEJAS" onerror="this.src='/assets/logo.svg'">
        <div class="kicker">SISTEMA INTERNO</div>
      </div>
    </section>

    <section class="panel">
      <h1>Entrar</h1>
      <p class="sub">Entre com seu e-mail institucional do CEJAS.</p>

      <div id="mensagem" class="msg"></div>

      <form id="formLogin" autocomplete="on">
        <div class="field">
          <label>E-mail institucional</label>
          <input id="email" type="email" placeholder="nome@cejas.com.br" autocomplete="username" required>
        </div>

        <div class="field">
          <label>Senha</label>
          <div class="pass">
            <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password" required>
            <button class="eye" type="button" id="toggleSenha">👁</button>
          </div>
        </div>

        <div class="row">
          <label class="remember">
            <input id="lembrar" type="checkbox">
            Manter-me conectado
          </label>

          <a href="#" onclick="alert('Vamos reativar a redefinição depois que o login estiver 100%.'); return false;">Esqueci minha senha</a>
        </div>

        <button class="btn" id="btnEntrar" type="submit">Entrar no sistema</button>
      </form>

      <div class="notice">
        No primeiro acesso, o usuário será obrigado a alterar a senha por segurança.
      </div>
    </section>
  </main>

  

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("formLogin");
  const email = document.getElementById("email");
  const senha = document.getElementById("senha");
  const lembrar = document.getElementById("lembrar");
  const btn = document.getElementById("btnEntrar");
  const msg = document.getElementById("mensagem");
  const toggle = document.getElementById("toggleSenha");

  function mostrar(texto, tipo = "err") {
    msg.textContent = texto || "";
    msg.className = texto ? "msg " + tipo : "msg";
  }

  if (toggle) {
    toggle.addEventListener("click", () => {
      senha.type = senha.type === "password" ? "text" : "password";
    });
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    mostrar("");

    const payload = {
      email: email.value.trim().toLowerCase(),
      senha: senha.value,
      lembrar: lembrar.checked
    };

    if (!payload.email.endsWith("@cejas.com.br")) {
      mostrar("Use apenas e-mail institucional @cejas.com.br.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Entrando...";

    try {
      const resposta = await fetch("/api/auth/login-cejas", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const dados = await resposta.json();

      if (!resposta.ok || !dados.ok) {
        throw new Error(dados.message || "Não foi possível entrar.");
      }

      mostrar("Login confirmado. Validando sessão...", "ok");

      await new Promise(resolve => setTimeout(resolve, 500));

      const sessao = await fetch("/api/auth/me?ts=" + Date.now(), {
        credentials: "include",
        cache: "no-store"
      });

      const sessaoDados = await sessao.json();

      if (!sessaoDados.ok) {
        throw new Error("Login confirmado, mas a sessão não foi mantida. Tente novamente.");
      }

      mostrar("Sessão confirmada. Abrindo painel...", "ok");

      setTimeout(() => {
        window.location.assign("/dashboard.html?login=ok&ts=" + Date.now());
      }, 300);
    } catch (error) {
      mostrar(error.message || "Erro ao entrar.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Entrar no sistema";
    }
  });
});
</script>

</body>
</html>
