<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sistema de Gestão CEJAS | Login ADM</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 18% 78%, rgba(123, 97, 255, 0.16), transparent 34%),
        radial-gradient(circle at 72% 74%, rgba(255, 97, 210, 0.11), transparent 30%),
        #050505;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(#ffffff 0.7px, transparent 0.7px),
        radial-gradient(#7b61ff 0.55px, transparent 0.55px);
      background-size: 82px 82px, 142px 142px;
      background-position: 0 0, 42px 62px;
      opacity: 0.34;
      pointer-events: none;
    }

    .login-page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 70px 110px;
    }

    .brand-area {
      text-align: center;
    }

    .brand-logo {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      box-shadow: 0 0 70px rgba(123, 97, 255, 0.38);
      margin-bottom: 28px;
    }

    .brand-title {
      font-size: 42px;
      letter-spacing: 8px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .brand-subtitle {
      font-size: 24px;
      font-weight: 700;
      color: #b3b3b3;
      margin-bottom: 20px;
    }

    .brand-url {
      color: #8f8f9c;
      font-size: 15px;
    }

    .form-area {
      width: 100%;
      max-width: 620px;
      margin-left: auto;
    }

    .form-title {
      font-size: 64px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 50px;
    }

    .field-group {
      margin-bottom: 22px;
    }

    .field-group label {
      display: block;
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 800;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 64px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      padding: 0 62px 0 38px;
      font-size: 17px;
      font-weight: 700;
      outline: none;
      transition: 0.25s ease;
    }

    .field input::placeholder {
      color: #b8b8c0;
    }

    .field input:focus {
      border-color: #7b61ff;
      box-shadow: 0 0 0 4px rgba(123, 97, 255, 0.18);
      background: rgba(255,255,255,0.16);
    }

    .field-icon {
      position: absolute;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      color: #8f8f9c;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
    }

    .forgot {
      display: block;
      text-align: right;
      color: #d7c7ff;
      text-decoration: none;
      font-weight: 800;
      margin: 8px 0 48px;
    }

    .forgot:hover {
      color: #ff61d2;
    }

    .login-button {
      width: 100%;
      height: 72px;
      border: 0;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(90deg, #7B61FF, #FF61D2);
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 24px 60px rgba(123, 97, 255, 0.25);
      transition: 0.25s ease;
    }

    .login-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
    }

    .account-info {
      text-align: center;
      margin-top: 46px;
    }

    .account-info h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .account-info p {
      color: #b3b3b3;
      font-size: 17px;
    }

    .message {
      min-height: 24px;
      margin-top: 18px;
      color: #ff5f68;
      text-align: center;
      font-weight: 800;
    }

    .security-note {
      position: fixed;
      left: 28px;
      bottom: 24px;
      z-index: 3;
      color: #777786;
      font-size: 12px;
    }

    @media (max-width: 1000px) {
      body {
        overflow: auto;
      }

      .login-page {
        grid-template-columns: 1fr;
        gap: 70px;
        padding: 50px 26px;
      }

      .form-area {
        margin: auto;
      }

      .form-title {
        font-size: 44px;
      }

      .brand-title {
        font-size: 30px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <main class="login-page">
    <section class="brand-area">
      <img class="brand-logo" src="assets/logo.svg" alt="Logo Sistema de Gestão CEJAS">

      <h1 class="brand-title">SISTEMA DE GESTÃO CEJAS</h1>
      <p class="brand-subtitle">PAINEL ADMINISTRATIVO</p>
      <p class="brand-url">sistema.cejas.com.br</p>
    </section>

    <section class="form-area">
      <h2 class="form-title">Login ADM.</h2>

      <form onsubmit="entrar(event)">
        <div class="field-group">
          <label for="email">Email</label>
          <div class="field">
            <input id="email" type="email" placeholder="seu@email.com" autocomplete="username" required>
            <span class="field-icon">◎</span>
          </div>
        </div>

        <div class="field-group">
          <label for="senha">Senha</label>
          <div class="field">
            <input id="senha" type="password" placeholder="Sua senha" autocomplete="current-password" required>
            <span class="field-icon" onclick="mostrarSenha()">◎</span>
          </div>
        </div>

        <a class="forgot" href="#">Esqueci minha senha</a>

        <button class="login-button" type="submit">Entrar</button>

        <div id="message" class="message"></div>
      </form>

      <div class="account-info">
        <h2>Acesso restrito</h2>
        <p>Somente administradores autorizados.</p>
      </div>
    </section>
  </main>

  <p class="security-note">Sistema privado. Acesso protegido por autenticação ADM.</p>

  <script>
    async function entrar(event) {
      event.preventDefault();

      const message = document.getElementById("message");
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      message.textContent = "";

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          message.textContent = data.message || "Não foi possível entrar.";
          return;
        }

        window.location.href = data.redirect;
      } catch (error) {
        message.textContent = "Servidor indisponível. Verifique se o sistema está rodando.";
      }
    }

    function mostrarSenha() {
      const senha = document.getElementById("senha");
      senha.type = senha.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
